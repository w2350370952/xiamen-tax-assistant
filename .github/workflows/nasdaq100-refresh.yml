name: Refresh Nasdaq 100

on:
  schedule:
    # 美股交易时段 UTC 13:30-21:00，每10分钟刷新
    - cron: "*/10 13-21 * * 1-5"

    # 其他时间，每小时刷新
    - cron: "47 0-12,22-23 * * *"

  workflow_dispatch:


jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh cached market data
        run: |
          curl --fail --silent --show-error \
            --retry 2 --retry-delay 5 \
            "https://www.xnaitax.top/api/nasdaq100?refresh=schedule"
