name: Refresh Nasdaq 100

on:
  schedule:
    - cron: "47 * * * 1-5"
    - cron: "17 22 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refresh cached market data
        run: |
          curl --fail --silent --show-error \
            --retry 2 --retry-delay 5 \
            "https://www.xnaitax.top/api/nasdaq100?refresh=schedule"
